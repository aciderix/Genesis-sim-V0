name: Build Windows & Android

on:
  push:
    branches: ['claude/**']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npx @tauri-apps/cli build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genesis-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Build APK (release)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign release APK with debug keystore
        run: |
          # Create a debug keystore for signing
          keytool -genkey -v -keystore debug-release.keystore \
            -alias genesis -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass genesis123 -keypass genesis123 \
            -dname "CN=Genesis,OU=Dev,O=Genesis,L=Unknown,ST=Unknown,C=US"
          # Find apksigner in Android SDK build-tools
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" -type f | sort -V | tail -1)
          # Sign the APK
          $APKSIGNER sign --ks debug-release.keystore \
            --ks-key-alias genesis \
            --ks-pass pass:genesis123 \
            --key-pass pass:genesis123 \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genesis-android
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
